name: test
on: [push]

vars:
  greeting: hello
  count: 3

templates:
  banner: "=== {{ greeting }} ==="

steps:
  - name: hello
    run: |
      {{ info(greeting) }}

  - if: count > 0
    name: check_count
    run: |
      {% if count > 0 %}
        {{ println('count is positive') }}
      {% endif %}

  - name: greet_shell
    shell: echo {{ greeting }} from shell
