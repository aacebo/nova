name: main
on: [run(5)]

vars:
  count: 3

steps:
  - name: greet
    run: |
      {{ info(lib.greeting) }}

  - if: count > 0
    name: check_count
    run: |
      {% if count > 0 %}
        {{ println('count is positive') }}
      {% endif %}

  - name: call_lib
    run: |
      {{ lib(name='world') }}

  - name: greet_shell
    shell: echo {{ lib.greeting }} from shell
