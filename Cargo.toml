[workspace]
resolver = "3"
members = [".", "cli", "crates/*"]
default-members = [".", "cli", "crates/*"]

[workspace.package]
version = "0.0.0"
edition = "2024"
license = "MIT"
readme = "README.md"
documentation = "https://www.docs.rs/nova"
homepage = "https://www.github.com/aacebo/nova"
repository = "https://www.github.com/aacebo/nova"

[package]
name = "nova"
version.workspace = true
edition.workspace = true
license.workspace = true
readme.workspace = true
documentation.workspace = true
homepage.workspace = true
repository.workspace = true

[lib]
doctest = false

[lints]
workspace = true

[features]
default = []
ai = ["dep:nova-ai"]

[workspace.lints.clippy]
type_complexity = "allow"

[patch.crates-io]
ort = { git = "https://github.com/pykeio/ort.git", tag = "v1.16.3" }

[dependencies]
nova-core = { path = "crates/core" }
nova-ai = { path = "crates/ai", optional = true }
