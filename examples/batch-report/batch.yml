name: batch
on: [run]

vars:
  log: /tmp/nova-batch-report.log
  items:
    - name: alpha
      score: 82
    - name: bravo
      score: 47
    - name: charlie
      score: 95

steps:
  - name: header
    shell: |
      : > {{ log }}
      echo "processing {{ items | length }} records"

  - name: fan_out
    run: |
      {% for item in items %}
        {{ format(record=item, index=loop.index, log=log) }}
      {% endfor %}

  - name: aggregate
    shell: |
      passed=$(grep -c PASS {{ log }})
      failed=$(grep -c FAIL {{ log }})
      echo "aggregate: $passed passed, $failed failed"

  - name: footer
    run: |
      {{ info('batch complete') }}
