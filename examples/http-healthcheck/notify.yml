name: notify
on: [run(10)]

vars:
  status_file: /tmp/nova-healthcheck.json

steps:
  - name: read_status
    run: |
      {% set report = json.decode(fs.read(status_file)) %}
      {% if report.healthy %}
        {{ info('notify: ' ~ report.url ~ ' is UP (' ~ report.status ~ ')') }}
      {% else %}
        {{ warn('notify: ' ~ report.url ~ ' is DOWN (' ~ report.status ~ ')') }}
      {% endif %}

  - name: dump_status
    shell: |
      echo "raw status payload:"
      cat {{ status_file }}
      echo

  - name: archive
    shell: |
      archive=/tmp/nova-healthcheck-$(date -u +%Y%m%d).json
      cp {{ status_file }} "$archive"
      echo "archived to $archive"
